name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Select Browser"
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      environment:
        description: "Select Environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Print selected options
        run: |
          echo "Browser: ${{ github.event.inputs.browser }}"
          echo "Environment: ${{ github.event.inputs.environment }}"