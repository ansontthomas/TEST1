name: Hello World Manual

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Select Browser"
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Display Selected Browser
        run: echo "Selected Browser: ${{ github.event.inputs.browser }}"

      - name: Print Hello World
        run: echo "Hello World"