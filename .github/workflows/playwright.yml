name: Run Sum Program

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Select Browser"
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Display selected browser
        run: echo "Browser: ${{ github.event.inputs.browser }}"

      - name: Run sum.js
        run: node sum.js